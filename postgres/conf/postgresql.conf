# PostgreSQL Production Configuration
# Optimizado para VPS Hetzner pequeño (2 vCPU, 4GB RAM)

# --------------------------------------
# CONNECTIONS AND AUTHENTICATION
# --------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3

# --------------------------------------
# MEMORY
# --------------------------------------
# shared_buffers: 25% de RAM total
shared_buffers = 1GB

# effective_cache_size: 75% de RAM total
effective_cache_size = 3GB

# work_mem: memoria por operación (cuidado con max_connections)
work_mem = 16MB

# maintenance_work_mem: para VACUUM, CREATE INDEX, etc.
maintenance_work_mem = 256MB

# --------------------------------------
# WAL
# --------------------------------------
wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# --------------------------------------
# QUERY TUNING
# --------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# --------------------------------------
# LOGGING
# --------------------------------------
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_timezone = 'UTC'

# --------------------------------------
# SECURITY
# --------------------------------------
ssl = off

# --------------------------------------
# LOCALE
# --------------------------------------
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# --------------------------------------
# TIMEZONE
# --------------------------------------
timezone = 'UTC'